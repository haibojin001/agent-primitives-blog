<rect x="210" y="62" width="650" height="190" rx="18" class="dash"/><text x="535" y="86" text-anchor="middle" class="label">MetaGPT Framework</text>
<rect x="240" y="116" width="92" height="54" rx="7" class="box"/><text x="286" y="137" text-anchor="middle" class="sub">Product</text><text x="286" y="154" text-anchor="middle" class="sub">Manager</text>
<rect x="362" y="116" width="92" height="54" rx="7" class="box"/><text x="408" y="147" text-anchor="middle" class="sub">Architect</text>
<rect x="484" y="116" width="92" height="54" rx="7" class="box"/><text x="530" y="137" text-anchor="middle" class="sub">Project</text><text x="530" y="154" text-anchor="middle" class="sub">Manager</text>
<rect x="606" y="116" width="92" height="54" rx="7" class="box orange"/><text x="652" y="147" text-anchor="middle" class="sub">Engineer</text>
<rect x="728" y="116" width="92" height="54" rx="7" class="box orange"/><text x="774" y="137" text-anchor="middle" class="sub">QA</text><text x="774" y="154" text-anchor="middle" class="sub">Engineer</text>
<path d="M332 143 H362" class="arrow"/><path d="M454 143 H484" class="arrow"/><path d="M576 143 H606" class="arrow"/><path d="M698 143 H728" class="arrow"/>
<rect x="240" y="198" width="580" height="38" rx="8" class="box workspace"/><text x="530" y="222" text-anchor="middle" class="sub">Workspace: shared files, context, messages, and knowledge</text>
<path d="M286 170 V198" class="arrowdash"/><path d="M408 170 V198" class="arrowdash"/><path d="M530 170 V198" class="arrowdash"/><path d="M652 170 V198" class="arrowdash"/><path d="M774 170 V198" class="arrowdash"/>
